{% extends "base.html" %}
{% block title %}FitPro – Crée ton programme{% endblock %}
{% block navbar %}{% endblock %}

{% block content %}
<div id="quizApp" style="min-height:100vh;background:var(--navy);position:relative;overflow:hidden;">

  <!-- Barre de progression fixe -->
  <div style="position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(8,14,28,.9);backdrop-filter:blur(20px);padding:14px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);">
    <a href="/" class="nav-logo" style="font-size:1.1rem;flex-shrink:0;">⚡ FitPro</a>
    <div style="flex:1;background:rgba(255,255,255,.08);border-radius:20px;height:6px;overflow:hidden;">
      <div id="globalProgress" style="height:100%;background:linear-gradient(90deg,#4d9fff,#00e5ff);border-radius:20px;transition:width .5s ease;box-shadow:0 0 10px rgba(0,229,255,.4);width:0%"></div>
    </div>
    <span id="progressPct" style="font-size:.8rem;font-weight:700;color:var(--accent2);flex-shrink:0;">0%</span>
  </div>

  <!-- Contenu quiz -->
  <div id="quizContent" style="padding-top:70px;"></div>

</div>
{% endblock %}

  {

    id: 'register'

];

const TOTAL = QUESTIONS.length;

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const q = QUESTIONS[currentQ];
  const pct = Math.round((currentQ / TOTAL) * 100);
  document.getElementById('globalProgress').style.width = pct + '%';
  document.getElementById('progressPct').textContent = pct + '%';

  const container = document.getElementById('quizContent');
  container.innerHTML = '';

  if (q.type === 'image-choice') renderImageChoice(q, container);
  else if (q.type === 'choice') renderChoice(q, container);
  else if (q.type === 'multi-choice') renderMultiChoice(q, container);
  else if (q.type === 'slider') renderSlider(q, container);
  else if (q.type === 'motivation') renderMotivation(q, container);
  else if (q.type === 'result') renderResult(container);
  else if (q.type === 'register') renderRegister(container);

  window.scrollTo(0, 0);
}

function next() {
  if (currentQ < TOTAL - 1) { currentQ++; render(); }
}
function prev() {
  if (currentQ > 0) { currentQ--; render(); }
}

// ─── IMAGE CHOICE ─────────────────────────────────────────────────────────────
function renderImageChoice(q, container) {
  container.innerHTML = `
  <div style="max-width:720px;margin:0 auto;padding:40px 24px;">
    ${backBtn()}
    <h2 style="font-size:1.9rem;font-weight:900;letter-spacing:-.03em;margin-bottom:8px;">${q.title}</h2>
    <p style="color:var(--muted);margin-bottom:32px;">${q.subtitle}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
      ${q.choices.map(c => `
        <div onclick="selectImgChoice(this,'${q.id}','${c.value}')"
          style="position:relative;border-radius:20px;overflow:hidden;min-height:180px;cursor:pointer;border:2px solid transparent;transition:all .3s;" id="ic_${c.value}">
          <div style="position:absolute;inset:0;background-image:url('${c.bg}');background-size:cover;background-position:center;transition:transform .4s;"></div>
          <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(8,14,28,.95) 0%,rgba(8,14,28,.3) 60%,transparent 100%);"></div>
          <div style="position:absolute;bottom:0;left:0;right:0;padding:18px 16px;">
            <div style="font-size:1.6rem;margin-bottom:6px;">${c.emoji}</div>
            <div style="font-weight:800;font-size:1rem;">${c.label}</div>
            <div style="font-size:.78rem;color:rgba(255,255,255,.6);margin-top:2px;">${c.desc}</div>
          </div>
        </div>`).join('')}
    </div>
  </div>`;
}
function selectImgChoice(el, field, value) {
  document.querySelectorAll('[id^="ic_"]').forEach(c => { c.style.borderColor = 'transparent'; c.style.boxShadow = 'none'; });
  el.style.borderColor = 'var(--accent)';
  el.style.boxShadow = '0 0 30px rgba(77,159,255,.3)';
  profile[field] = value;
  setTimeout(next, 400);
}

// ─── CHOICE ───────────────────────────────────────────────────────────────────
function renderChoice(q, container) {
  container.innerHTML = `
  <div style="max-width:560px;margin:0 auto;padding:40px 24px;">
    ${backBtn()}
    <h2 style="font-size:1.9rem;font-weight:900;letter-spacing:-.03em;margin-bottom:8px;">${q.title}</h2>
    <p style="color:var(--muted);margin-bottom:32px;">${q.subtitle}</p>
    <div style="display:flex;flex-direction:column;gap:12px;">
      ${q.choices.map(c => `
        <div onclick="selectChoice(this,'${q.id}','${c.value}')"
          style="display:flex;align-items:center;gap:16px;background:var(--glass);backdrop-filter:blur(20px);border:2px solid var(--border);border-radius:16px;padding:18px 20px;cursor:pointer;transition:all .25s;" id="ch_${c.value}">
          <span style="font-size:1.8rem;flex-shrink:0;">${c.emoji}</span>
          <div>
            <div style="font-weight:700;font-size:.95rem;">${c.label}</div>
            ${c.desc ? `<div style="font-size:.8rem;color:var(--muted);margin-top:2px;">${c.desc}</div>` : ''}
          </div>
          <div style="margin-left:auto;width:22px;height:22px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;" id="radio_${c.value}"></div>
        </div>`).join('')}
    </div>
  </div>`;
}
function selectChoice(el, field, value) {
  document.querySelectorAll('[id^="ch_"]').forEach(c => { c.style.borderColor = 'var(--border)'; c.style.background = 'var(--glass)'; c.style.boxShadow = 'none'; });
  document.querySelectorAll('[id^="radio_"]').forEach(r => { r.style.background = 'none'; r.style.borderColor = 'var(--border)'; });
  el.style.borderColor = 'var(--accent)';
  el.style.background = 'rgba(77,159,255,.08)';
  el.style.boxShadow = '0 0 20px rgba(77,159,255,.15)';
  document.getElementById('radio_' + value).style.background = 'var(--accent)';
  document.getElementById('radio_' + value).style.borderColor = 'var(--accent)';
  profile[field] = value;
  setTimeout(next, 350);
}

// ─── MULTI CHOICE ─────────────────────────────────────────────────────────────
function renderMultiChoice(q, container) {
  container.innerHTML = `
  <div style="max-width:560px;margin:0 auto;padding:40px 24px;">
    ${backBtn()}
    <h2 style="font-size:1.9rem;font-weight:900;letter-spacing:-.03em;margin-bottom:8px;">${q.title}</h2>
    <p style="color:var(--muted);margin-bottom:32px;">${q.subtitle}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
      ${q.choices.map(c => `
        <div onclick="toggleMulti(this,'${q.id}','${c.value}')"
          style="display:flex;align-items:center;gap:12px;background:var(--glass);backdrop-filter:blur(20px);border:2px solid var(--border);border-radius:16px;padding:16px;cursor:pointer;transition:all .2s;" id="mc_${c.value}">
          <span style="font-size:1.5rem;">${c.emoji}</span>
          <span style="font-weight:600;font-size:.875rem;">${c.label}</span>
        </div>`).join('')}
    </div>
    <button onclick="confirmMulti('${q.id}')" class="btn-primary full-width" style="margin-top:28px;font-size:1rem;padding:16px;">Confirmer →</button>
  </div>`;
  profile[q.id] = [];
}
function toggleMulti(el, field, value) {
  const arr = profile[field] || [];
  if (arr.includes(value)) {
    profile[field] = arr.filter(v => v !== value);
    el.style.borderColor = 'var(--border)';
    el.style.background = 'var(--glass)';
  } else {
    profile[field] = [...arr, value];
    el.style.borderColor = 'var(--accent)';
    el.style.background = 'rgba(77,159,255,.1)';
  }
}
function confirmMulti(field) { if ((profile[field]||[]).length > 0) next(); }

// ─── SLIDER ───────────────────────────────────────────────────────────────────
function renderSlider(q, container) {
  profile[q.id] = q.defaultVal;
  container.innerHTML = `
  <div style="max-width:520px;margin:0 auto;padding:40px 24px;">
    ${backBtn()}
    <div style="text-align:center;margin-bottom:40px;">
      <div style="font-size:3rem;margin-bottom:16px;">${q.icon}</div>
      <h2 style="font-size:1.9rem;font-weight:900;letter-spacing:-.03em;margin-bottom:8px;">${q.title}</h2>
      <p style="color:var(--muted);">${q.subtitle}</p>
    </div>
    <div style="background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:40px 32px;text-align:center;">
      <div id="sliderVal" style="font-size:4rem;font-weight:900;letter-spacing:-.04em;color:var(--accent2);line-height:1;">${q.defaultVal}<span style="font-size:1.8rem;color:var(--muted);font-weight:500;">${q.unit}</span></div>
      <input type="range" id="sliderInput" min="${q.min}" max="${q.max}" step="${q.step}" value="${q.defaultVal}"
        oninput="updateSlider(this, '${q.id}', '${q.unit}')"
        style="width:100%;margin-top:28px;accent-color:var(--accent);height:6px;cursor:pointer;">
      <div style="display:flex;justify-content:space-between;margin-top:8px;color:var(--muted);font-size:.75rem;">
        <span>${q.min}${q.unit}</span><span>${q.max}${q.unit}</span>
      </div>
    </div>
    <button onclick="confirmSlider('${q.id}')" class="btn-primary full-width" style="margin-top:24px;font-size:1rem;padding:16px;">Suivant →</button>
  </div>`;
}
function updateSlider(el, field, unit) {
  document.getElementById('sliderVal').innerHTML = el.value + '<span style="font-size:1.8rem;color:var(--muted);font-weight:500;">' + unit + '</span>';
  profile[field] = parseFloat(el.value);
}
function confirmSlider(field) { next(); }

// ─── MOTIVATION ───────────────────────────────────────────────────────────────
function renderMotivation(q, container) {
  const colors = {
    blue: { bg: 'rgba(77,159,255,.08)', border: 'rgba(77,159,255,.25)', glow: 'rgba(77,159,255,.3)' },
    orange: { bg: 'rgba(255,112,67,.08)', border: 'rgba(255,112,67,.25)', glow: 'rgba(255,112,67,.3)' },
    green: { bg: 'rgba(0,229,160,.08)', border: 'rgba(0,229,160,.25)', glow: 'rgba(0,229,160,.3)' },
  };
  const c = colors[q.color];
  container.innerHTML = `
  <div style="max-width:520px;margin:0 auto;padding:80px 24px;text-align:center;">
    <div style="background:${c.bg};border:1px solid ${c.border};border-radius:28px;padding:48px 40px;box-shadow:0 0 60px ${c.glow};">
      <div style="font-size:4rem;margin-bottom:24px;">${q.emoji}</div>
      <h2 style="font-size:1.8rem;font-weight:900;letter-spacing:-.03em;margin-bottom:16px;">${q.title}</h2>
      <p style="color:rgba(255,255,255,.7);line-height:1.7;font-size:1rem;margin-bottom:36px;">${q.text}</p>
      <button onclick="next()" class="btn-primary" style="font-size:1rem;padding:16px 40px;">${q.btnLabel}</button>
    </div>
  </div>`;
}

// ─── RESULT ───────────────────────────────────────────────────────────────────
function renderResult(container) {
  const goal = profile.goal || 'perte_poids';
  const tw = parseFloat(profile.target_weight) || 65;
  const cw = parseFloat(profile.weight) || 72;
  const diff = Math.abs(cw - tw).toFixed(1);
  const weeks = Math.ceil(diff / 0.75);
  const targetDate = new Date();
  targetDate.setDate(targetDate.getDate() + weeks * 7);
  const dateStr = targetDate.toLocaleDateString('fr-FR', { day:'numeric', month:'long', year:'numeric' });

  const goalLabels = { perte_poids: 'perte de poids', prise_masse: 'prise de masse', tonification: 'tonification', forme: 'forme générale' };

  container.innerHTML = `
  <div style="max-width:600px;margin:0 auto;padding:40px 24px;">
    ${backBtn()}
    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-size:3rem;margin-bottom:12px;">🎉</div>
      <h2 style="font-size:2rem;font-weight:900;letter-spacing:-.03em;margin-bottom:8px;">Ton programme est prêt !</h2>
      <p style="color:var(--muted);">Basé sur tes réponses, voici ton plan personnalisé</p>
    </div>

    <!-- Projection graphique -->
    <div style="background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border2);border-radius:24px;padding:28px;margin-bottom:20px;">
      <div style="font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;">📈 Projection de résultats</div>
      <div style="display:flex;align-items:flex-end;gap:8px;height:100px;margin-bottom:12px;">
        ${Array.from({length:5}).map((_, i) => {
          const h = 30 + i * 17;
          const opacity = 0.3 + i * 0.175;
          return `<div style="flex:1;background:linear-gradient(to top,rgba(77,159,255,${opacity}),rgba(0,229,255,${opacity*.7}));border-radius:6px 6px 0 0;height:${h}%;border:1px solid rgba(77,159,255,.2);position:relative;">
            ${i === 4 ? '<div style="position:absolute;top:-28px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.72rem;font-weight:700;color:#00e5ff;">Objectif ✓</div>' : ''}
          </div>`;
        }).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);">
        <span>Auj.</span><span>S2</span><span>S4</span><span>S6</span><span>S8+</span>
      </div>
    </div>

    <!-- Stats résultat -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
      <div style="background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:18px;padding:20px;text-align:center;">
        <div style="font-size:2rem;font-weight:900;color:var(--accent2);">${diff} kg</div>
        <div style="font-size:.78rem;color:var(--muted);margin-top:4px;">Objectif ${goalLabels[goal]}</div>
      </div>
      <div style="background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:18px;padding:20px;text-align:center;">
        <div style="font-size:2rem;font-weight:900;color:var(--green);">${weeks} sem.</div>
        <div style="font-size:.78rem;color:var(--muted);margin-top:4px;">Pour atteindre l'objectif</div>
      </div>
      <div style="background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:18px;padding:20px;text-align:center;grid-column:1/-1;">
        <div style="font-size:1.1rem;font-weight:800;color:#ffa040;">📅 ${dateStr}</div>
        <div style="font-size:.78rem;color:var(--muted);margin-top:4px;">Date estimée d'atteinte de l'objectif</div>
      </div>
    </div>

    <!-- Ce que tu vas recevoir -->
    <div style="background:linear-gradient(135deg,rgba(77,159,255,.08),rgba(0,229,255,.04));border:1px solid var(--border2);border-radius:24px;padding:24px;margin-bottom:24px;">
      <div style="font-size:.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:16px;">📦 Ce que tu vas recevoir</div>
      ${[
        ['💪', 'Programme entraînement 4 semaines', 'Adapté à ton niveau et ton équipement'],
        ['🥗', 'Plan nutrition personnalisé', 'Objectif calorique + idées repas'],
        ['📊', 'Suivi de tes progrès', 'Graphiques et statistiques en temps réel'],
        ['🔓', '4 semaines complètes', 'Avec Premium — Semaines 2, 3 et 4 débloquées'],
      ].map(([icon, title, desc]) => `
        <div style="display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid var(--border);">
          <span style="font-size:1.4rem;">${icon}</span>
          <div><div style="font-weight:600;font-size:.9rem;">${title}</div><div style="font-size:.78rem;color:var(--muted);">${desc}</div></div>
          <span style="margin-left:auto;color:var(--green);font-weight:800;">✓</span>
        </div>`).join('')}
    </div>

    <button onclick="next()" class="btn-primary full-width" style="font-size:1.05rem;padding:18px;">
      Créer mon compte gratuit →
    </button>
    <p style="text-align:center;font-size:.78rem;color:var(--muted);margin-top:12px;">La semaine 1 est 100% gratuite. Sans carte bancaire.</p>
  </div>`;
}

// ─── REGISTER ─────────────────────────────────────────────────────────────────
function renderRegister(container) {
  container.innerHTML = `
  <div style="max-width:480px;margin:0 auto;padding:40px 24px;">
    ${backBtn()}
    <div style="text-align:center;margin-bottom:32px;">
      <div style="font-size:2.5rem;margin-bottom:12px;">🚀</div>
      <h2 style="font-size:2rem;font-weight:900;letter-spacing:-.03em;margin-bottom:8px;">Crée ton compte</h2>
      <p style="color:var(--muted);">Pour accéder à ton programme personnalisé</p>
    </div>
    <div style="background:var(--glass);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:24px;padding:32px;">
      <div class="form-group"><label>Prénom</label><input type="text" id="regName" placeholder="Ex: Thomas" oninput="checkReg()"></div>
      <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="ton@email.com" oninput="checkReg()"></div>
      <div class="form-group" style="margin-bottom:0;"><label>Mot de passe</label><input type="password" id="regPassword" placeholder="6 caractères minimum" oninput="checkReg()"></div>
    </div>
    <div id="regError" class="error-msg hidden" style="margin-top:12px;"></div>
    <button onclick="finishOnboarding()" class="btn-primary full-width" id="finishBtn" disabled style="margin-top:20px;font-size:1.05rem;padding:18px;">
      <span id="finishText">Voir mon programme →</span>
    </button>
    <p style="text-align:center;font-size:.78rem;color:var(--muted);margin-top:14px;">
      Déjà un compte ? <a href="#" onclick="openModal('loginModal')" style="color:var(--accent);">Se connecter</a>
    </p>
  </div>`;
}
function checkReg() {
  const n = document.getElementById('regName')?.value.trim();
  const e = document.getElementById('regEmail')?.value.trim();
  const p = document.getElementById('regPassword')?.value;
  const btn = document.getElementById('finishBtn');
  if (btn) btn.disabled = !(n && e && p && p.length >= 6);
}

async function finishOnboarding() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  const btn = document.getElementById('finishBtn');
  const errDiv = document.getElementById('regError');
  btn.disabled = true;
  document.getElementById('finishText').innerHTML = '<span class="spinner"></span>';
  const regRes = await fetch('/api/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name,email,password}) });
  const regData = await regRes.json();
  if (!regData.success) {
    errDiv.textContent = regData.error;
    errDiv.classList.remove('hidden');
    btn.disabled = false;
    document.getElementById('finishText').textContent = 'Voir mon programme →';
    return;
  }
  await fetch('/api/save-profile', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(profile) });
  window.location.href = '/dashboard?new=1';
}

// ─── BACK BUTTON ──────────────────────────────────────────────────────────────
function backBtn() {
  return currentQ > 0 ? `<button onclick="prev()" style="background:var(--glass);backdrop-filter:blur(10px);border:1px solid var(--border);color:var(--muted);padding:8px 16px;border-radius:50px;font-size:.85rem;cursor:pointer;margin-bottom:28px;transition:all .2s;">← Retour</button>` : '';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
render();
</script>
{% endblock %}
