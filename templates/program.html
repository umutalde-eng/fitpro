{% extends "base.html" %}
{% block title %}FitPro – Mon Programme{% endblock %}

{% block content %}
<div class="page-wrapper">
  <!-- Program Hero Banner -->
  <div style="position:relative;height:200px;overflow:hidden;background:#030306;">
    <div style="position:absolute;inset:0;background-image:url('https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?w=1400&q=80');background-size:cover;background-position:center 30%;filter:brightness(.2) saturate(1.3);"></div>
    <div style="position:absolute;inset:0;background:linear-gradient(90deg,rgba(3,3,6,.97) 0%,rgba(255,45,155,.1) 100%);"></div>
    <div style="position:relative;z-index:1;height:100%;display:flex;align-items:flex-end;padding:0 40px 32px;max-width:1100px;margin:0 auto;">
      <div>
        <div style="font-size:.7rem;font-weight:800;color:#ff2d9b;letter-spacing:.15em;text-transform:uppercase;margin-bottom:8px;">MON PROGRAMME</div>
        <h1 style="font-size:2.2rem;font-weight:900;font-style:italic;text-transform:uppercase;letter-spacing:-.02em;">WORKOUT <span style="background:linear-gradient(90deg,#ff2d9b,#8b2fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">4 SEMAINES</span></h1>
        <p id="programSubtitle" style="color:#666;font-size:.85rem;margin-top:4px;">Chargement...</p>
      </div>
    </div>
  </div>

  <div class="page-container">
    <div class="week-tabs" id="weekTabs"></div>
    <div id="programContent"></div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let programData = null;
let activeWeek = 0;

async function loadProgram() {
  const r = await fetch('/api/get-program');
  if (!r.ok) { window.location.href = '/onboarding'; return; }
  programData = await r.json();
  document.getElementById('programSubtitle').textContent = programData.workout.name;
  renderTabs();
  renderWeek(0);
}

function renderTabs() {
  const tabs = document.getElementById('weekTabs');
  tabs.innerHTML = '';
  const allWeeks = programData.workout.weeks;

  allWeeks.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'week-tab' + (i === 0 ? ' active' : '');
    btn.textContent = `S${w.week} – ${w.theme}`;
    btn.onclick = () => selectWeek(i);
    tabs.appendChild(btn);
  });

  if (!programData.is_premium && programData.locked_weeks > 0) {
    for (let i = 0; i < programData.locked_weeks; i++) {
      const btn = document.createElement('button');
      btn.className = 'week-tab locked';
      btn.textContent = `S${allWeeks.length + i + 1} 🔒`;
      btn.onclick = () => showLockMessage();
      tabs.appendChild(btn);
    }
  }
}

function selectWeek(i) {
  document.querySelectorAll('.week-tab').forEach((t, idx) => t.classList.toggle('active', idx === i));
  activeWeek = i;
  renderWeek(i);
}

function renderWeek(i) {
  const content = document.getElementById('programContent');
  const week = programData.workout.weeks[i];
  if (!week) { content.innerHTML = renderLockBlock(); return; }

  let html = `<div style="margin-bottom:20px;padding:16px 22px;background:rgba(255,45,155,.05);border-radius:var(--radius);border:1px solid rgba(255,45,155,.15);">
    <strong style="font-style:italic;text-transform:uppercase;font-size:.95rem;">Semaine ${week.week} : ${week.theme}</strong>
    <span style="color:var(--muted);font-size:.8rem;margin-left:12px;">${week.days.length} séances prévues</span>
  </div>`;

  week.days.forEach((day, di) => {
    const colors = ['#ff2d9b','#8b2fff','#00e5a0','#ff7043'];
    const col = colors[di % colors.length];
    html += `
    <div class="session-card">
      <div class="session-header" onclick="toggleSession('sess-${i}-${di}')">
        <div style="display:flex;align-items:center;gap:14px;">
          <div style="width:4px;height:48px;background:${col};border-radius:4px;flex-shrink:0;"></div>
          <div>
            <h3 style="font-style:italic;text-transform:uppercase;">${day.day} – ${day.type}</h3>
            <div style="color:var(--muted);font-size:.78rem;margin-top:3px;">⏱ ${day.duration}</div>
          </div>
        </div>
        <div class="session-meta">
          <span style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);padding:4px 12px;border-radius:50px;font-size:.72rem;font-weight:700;color:${col};">${day.exercises.length} exercices</span>
          <button onclick="event.stopPropagation();logSession(${week.week},'${day.day}','${day.type}')"
            class="btn-green" style="padding:6px 14px;font-size:.78rem;">✓ Fait</button>
          <span style="color:var(--muted);font-size:1rem;" id="arrow-${i}-${di}">▼</span>
        </div>
      </div>
      <div class="session-body" id="sess-${i}-${di}">
        <div class="exercise-list">`;

    day.exercises.forEach(ex => {
      html += `
          <div class="exercise-row">
            <div class="exercise-name">${ex.name}</div>
            <div style="text-align:right;">
              <div class="exercise-sets">${ex.sets} × ${ex.reps}</div>
              <div class="exercise-detail">Repos : ${ex.rest}</div>
            </div>
          </div>`;
    });

    html += `</div></div></div>`;
  });

  content.innerHTML = html;
}

function renderLockBlock() {
  return `<div class="lock-overlay">
    <div style="font-size:3rem;margin-bottom:16px;">🔒</div>
    <h3 style="font-style:italic;text-transform:uppercase;font-size:1.4rem;margin-bottom:10px;">Semaine verrouillée</h3>
    <p style="color:var(--muted);margin-bottom:28px;">Passe en Premium pour débloquer les semaines 2, 3 et 4 du programme.</p>
    <a href="/pricing" class="fz-btn-primary">Débloquer · 14,90€/mois</a>
  </div>`;
}

function toggleSession(id) {
  document.getElementById(id).classList.toggle('open');
}

function showLockMessage() {
  showToast('Passe en Premium pour débloquer cette semaine 🔒', 'error');
}

async function logSession(week, day, type) {
  await fetch('/api/log-session', {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({week, day, type, completed: true})
  });
  showToast('Séance enregistrée ! 🎉', 'success');
}

loadProgram();
</script>
{% endblock %}
